spring.application.name=input_analysis

#liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml
#database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/input_analysis_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
#rabbitmq
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
rabbitmq.exchange.marketing=${RABBITMQ_RATING_EXCHANGE:marketing.exchange}
rabbitmq.routing-key.train=${RABBITMQ_ROUTING-KEY_TRAIN:train.key}
rabbitmq.routing-key.predict=${RABBITMQ_ROUTING-KEY_PREDICT:predict.key}
rabbitmq.routing-key.analysis=${RABBITMQ_ROUTING-KEY_ANALYSIS:analysis.key}
#security
jwt.secret=${JWT_SECRET:myDefaultSecretKeyForLocalTests1234567890}
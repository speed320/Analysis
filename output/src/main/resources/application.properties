spring.application.name=output

#liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml
#database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/output_analysis_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
#rabbitmq
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
rabbitmq.exchange.results=${RABBITMQ_RESULT_EXCHANGE:results.exchange}
rabbitmq.queue.results=${RABBITMQ_QUEUE_RESULTS:results.queue}
rabbitmq.routing-key.analysis-res=${RABBITMQ_ROUTING-KEY_ANALYSIS:analysis.result.key}
rabbitmq.routing-key.predict-res=${RABBITMQ_ROUTING-KEY_PREDICT:predict.result.key}
#security
jwt.secret=${JWT_SECRET:myDefaultSecretKeyForLocalTests1234567890}